<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>个人数字名片</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1565C0 0%, #42A5F5 100%);
            min-height: 100vh;
            padding: 24px 16px 40px;
            color: #212121;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow: hidden;
            max-width: 420px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #1565C0, #42A5F5);
            color: #fff;
            padding: 28px 24px;
            text-align: center;
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .title, .company {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }
        .body {
            padding: 20px 24px 24px;
        }
        .row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
        }
        .row:last-child { border-bottom: none; }
        .label {
            width: 72px;
            color: #757575;
            flex-shrink: 0;
        }
        .value {
            flex: 1;
            color: #212121;
            word-break: break-all;
        }
        .bio {
            line-height: 1.6;
            color: #616161;
            font-size: 14px;
            margin-top: 8px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .empty-tip {
            text-align: center;
            color: #9e9e9e;
            padding: 40px 20px;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            margin-top: 20px;
        }
        a.value { color: #1565C0; text-decoration: none; }
    </style>
</head>
<body>
<div class="card" id="card" style="display:none;">
    <div class="header">
        <div class="avatar">👤</div>
        <div class="name" id="name">—</div>
        <div class="title" id="title"></div>
        <div class="company" id="company"></div>
    </div>
    <div class="body">
        <div class="row" id="rowPhone" style="display:none;">
            <span class="label">电话</span>
            <a class="value" id="phone" href="#"></a>
        </div>
        <div class="row" id="rowEmail" style="display:none;">
            <span class="label">邮箱</span>
            <a class="value" id="email" href="#"></a>
        </div>
        <div id="bioWrap" style="display:none;">
            <div class="label" style="margin-bottom:6px;">简介</div>
            <div class="bio" id="bio"></div>
        </div>
    </div>
</div>
<div class="empty-tip" id="emptyTip" style="display:none;">暂无名片信息</div>
<div class="footer">个人数字名片 · 微信扫码查看</div>

<script>
    function getParam(key) {
        var params = new URLSearchParams(window.location.search);
        var value = params.get(key);
        return value ? decodeURIComponent(value.replace(/\+/g, ' ')) : '';
    }

    function setText(id, text) {
        var el = document.getElementById(id);
        if (el && text) {
            el.textContent = text;
            el.style.display = text ? '' : 'none';
        }
        return !!text;
    }

    var name = getParam('name');
    var title = getParam('title');
    var phone = getParam('phone');
    var email = getParam('email');
    var company = getParam('company');
    var bio = getParam('bio');

    var hasContent = name || title || phone || email || company || bio;

    if (!hasContent) {
        document.getElementById('emptyTip').style.display = 'block';
    } else {
        document.getElementById('card').style.display = 'block';
        document.getElementById('name').textContent = name || '未填写姓名';
        setText('title', title);
        setText('company', company);

        if (phone) {
            document.getElementById('rowPhone').style.display = 'flex';
            var phoneEl = document.getElementById('phone');
            phoneEl.textContent = phone;
            phoneEl.href = 'tel:' + phone;
        }
        if (email) {
            document.getElementById('rowEmail').style.display = 'flex';
            var emailEl = document.getElementById('email');
            emailEl.textContent = email;
            emailEl.href = 'mailto:' + email;
        }
        if (bio) {
            document.getElementById('bioWrap').style.display = 'block';
            document.getElementById('bio').textContent = bio;
        }
        document.title = (name || '个人数字名片') + ' - 数字名片';
    }
</script>
</body>
</html>
